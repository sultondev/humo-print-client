<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>humopri nt — Sifatli bosma xizmatlari</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:'DM Sans', sans-serif; background:#0F0F0F; -webkit-font-smoothing:antialiased; }
  img { max-width:100%; display:block; }
  button { font-family: inherit; }

  /* Desktop nav shown, mobile hidden by default */
  .desktop-nav { display:flex !important; }
  .mobile-menu-btn { display:none !important; }

  @media (max-width: 900px) {
    .desktop-nav { display:none !important; }
    .mobile-menu-btn { display:flex !important; }
    .hero-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .hero-image-wrap { display:none; }
    .services-grid { grid-template-columns: 1fr !important; }
    .portfolio-preview-grid { grid-template-columns: 1fr 1fr !important; }
    .portfolio-full-grid { grid-template-columns: 1fr 1fr !important; }
    .steps-grid { grid-template-columns: 1fr 1fr !important; }
    .step-connector { display:none !important; }
    .testimonials-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; gap:32px !important; }
    .service-row-grid { grid-template-columns: 1fr !important; direction: ltr !important; gap:32px !important; }
    .order-grid { grid-template-columns: 1fr !important; }
    .contact-grid { grid-template-columns: 1fr !important; }
    .lightbox-inner { grid-template-columns: 1fr !important; }
    .form-2col { grid-template-columns: 1fr !important; }
    .try-grid { grid-template-columns: 1fr !important; }
  }

  @media (max-width: 580px) {
    .portfolio-preview-grid { grid-template-columns: 1fr !important; }
    .portfolio-full-grid { grid-template-columns: 1fr !important; }
    .steps-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: 1fr !important; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#0F0F0F; }
  ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }

  /* Page transition */
  .page-enter { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="ServicesPage.jsx"></script>
<script type="text/babel" src="PortfolioPage.jsx"></script>
<script type="text/babel" src="OrderPage.jsx"></script>
<script type="text/babel" src="ContactPage.jsx"></script>
<script type="text/babel" src="TryPage.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#16A34A",
  "darkBg": "#1A0F0A",
  "creamBg": "#F5F0EB",
  "headingFont": "Outfit",
  "bodyFont": "DM Sans"
}/*EDITMODE-END*/;

function App() {
  const saved = localStorage.getItem('humoprint_page');
  const [page, setPage] = useState(saved || 'home');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    localStorage.setItem('humoprint_page', page);
  }, [page]);

  const navigate = (p) => { setPage(p); window.scrollTo(0,0); };

  // Tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if(e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const applyTweak = (key, val) => {
    const next = {...tweaks, [key]:val};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:val}},'*');
  };

  const pages = { home: HomePage, services: ServicesPage, portfolio: PortfolioPage, order: OrderPage, contact: ContactPage, try: TryPage };
  const PageComponent = pages[page] || HomePage;

  // Listen for nav events from anywhere in the app (e.g. TryPage "Order" button)
  useEffect(() => {
    const onNav = (e) => navigate(e.detail);
    window.addEventListener('humoprint:nav', onNav);
    return () => window.removeEventListener('humoprint:nav', onNav);
  }, []);

  return (
    <div style={{
      '--accent': tweaks.accentColor,
      '--dark': tweaks.darkBg,
      '--cream': tweaks.creamBg,
    }}>
      <Header currentPage={page} navigate={navigate}/>
      <main key={page} className="page-enter">
        <PageComponent navigate={navigate}/>
      </main>
      <Footer navigate={navigate}/>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{
          position:'fixed', bottom:24, right:24, zIndex:3000,
          background:'#fff', borderRadius:16, padding:24, width:280,
          boxShadow:'0 16px 48px rgba(0,0,0,0.2)',
          fontFamily:'DM Sans,sans-serif',
        }}>
          <div style={{ fontFamily:'Outfit,sans-serif',fontWeight:700,fontSize:16,color:'#0F0F0F',marginBottom:20 }}>Tweaks</div>

          <div style={{ marginBottom:16 }}>
            <label style={{ fontSize:12,fontWeight:600,color:'#6B6B6B',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.08em' }}>Accent rangi</label>
            <div style={{ display:'flex',gap:8,flexWrap:'wrap' }}>
              {['#E85D26','#2563EB','#16A34A','#9333EA','#DC2626'].map(c=>(
                <button key={c} onClick={()=>applyTweak('accentColor',c)} style={{
                  width:32,height:32,borderRadius:'50%',background:c,border:'none',cursor:'pointer',
                  outline: tweaks.accentColor===c ? '3px solid #0F0F0F' : 'none',
                  outlineOffset:2,
                }}/>
              ))}
            </div>
          </div>

          <div style={{ marginBottom:16 }}>
            <label style={{ fontSize:12,fontWeight:600,color:'#6B6B6B',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.08em' }}>Fon rangi</label>
            <div style={{ display:'flex',gap:8 }}>
              {['#0F0F0F','#0A0A1A','#1A0F0A','#0A1A0A'].map(c=>(
                <button key={c} onClick={()=>applyTweak('darkBg',c)} style={{
                  width:32,height:32,borderRadius:'50%',background:c,border:'1px solid rgba(0,0,0,0.15)',cursor:'pointer',
                  outline: tweaks.darkBg===c ? '3px solid #E85D26' : 'none',
                  outlineOffset:2,
                }}/>
              ))}
            </div>
          </div>

          <div>
            <label style={{ fontSize:12,fontWeight:600,color:'#6B6B6B',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.08em' }}>Sarlavha shrift</label>
            <div style={{ display:'flex',gap:8,flexWrap:'wrap' }}>
              {['Outfit','Georgia','Courier New'].map(f=>(
                <button key={f} onClick={()=>applyTweak('headingFont',f)} style={{
                  padding:'6px 12px',borderRadius:8,border:'1.5px solid',
                  borderColor: tweaks.headingFont===f ? '#E85D26' : 'rgba(0,0,0,0.12)',
                  background:'none',cursor:'pointer',fontFamily:f,fontSize:13,
                  color: tweaks.headingFont===f ? '#E85D26' : '#0F0F0F',
                }}>{f}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
